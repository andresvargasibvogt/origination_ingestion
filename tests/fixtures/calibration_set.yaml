# Calibration fixture for the section + departamento relevance filter.
#
# Section codigos use the SAME format returned by the BOE Datos Abiertos
# JSON sumario API (verified live 2026-06-02):
#
#   "1"   I.   Disposiciones generales
#   "2A"  II.A Nombramientos
#   "2B"  II.B Oposiciones y concursos
#   "3"   III. Otras disposiciones        ← only positives live here today
#   "4"   IV.  Administración de Justicia
#   "5A"  V.A  Contratación del Sector Público
#   "5B"  V.B  Otros anuncios oficiales
#   "5C"  V.C  Anuncios particulares
#
# Positives must match the YAML's current rules. Today: only Section 3 +
# MITECO codigo 9575. If we add more rules later (e.g. Section 5B +
# Delegación del Gobierno for info-pública anuncios), the entries currently
# under "negatives_against_current_filter_but_possibly_positives_later"
# should move up.


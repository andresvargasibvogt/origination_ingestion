    departamento: { codigo: "9575", nombre: "MINISTERIO PARA LA TRANSICIÓN ECOLÓGICA Y EL RETO DEMOGRÁFICO" }
    expected: false
  # Industria/Economía ministries are OUT of scope (user-confirmed) — every era
  - section: "3"
    departamento: { codigo: "5250", nombre: "MINISTERIO DE INDUSTRIA, COMERCIO Y TURISMO" }
    expected: false
  - section: "3"
    departamento: { codigo: "9281", nombre: "MINISTERIO DE ECONOMÍA, INDUSTRIA Y COMPETITIVIDAD" }
    expected: false
  - section: "3"
    departamento: { codigo: "9591", nombre: "MINISTERIO DE INDUSTRIA Y TURISMO" }
    expected: false

# BOE BACKFILL relevance filter (historical-aware superset).
#
# Used ONLY by the backfill Job (--relevance-profile=backfill). The daily Job
# keeps using relevance.yaml unchanged. This file is a SUPERSET: it must match
# everything relevance.yaml matches today PLUS the historical ministry names so
# a 2019→present backfill is complete across every government reorganization.
#
# BOE Rule.matches() passes an item if its departamento código is in
# departamento_codigos OR any issuer_name_patterns regex matches the departamento
# nombre. Name patterns are stable across código drift, so they carry the
# historical eras where the código differs from today's.
#
# SEEDED with the current taxonomy so the most-recent (2026) chunk runs with
# certainty. The historical issuer_name_patterns / códigos below the marker are
# filled in (and user-confirmed) from scripts/enumerate_departamentos.py before
# the pre-2024 chunks run — NOT guessed. See docs/operational/backfill-runbook.md.

rules:

  # Section III (Otras disposiciones) — both ministries.
  - section: "3"
    departamento_codigos:
      - "9575"   # MITECO (current código)
      - "9593"   # MPTYMD (current código)
    # --- historical eras (appended after enumeration + confirmation) ---
    # issuer_name_patterns:
    #   - "Transición Ecológica"   # MITECO lineage across código changes
    #   - "Reto Demográfico"
    #   - "Política Territorial"   # territorial-ministry lineage

  # Section V (Anuncios) — territorial ministry (MPTYMD lineage).
  - section: "5A"
    departamento_codigos:
      - "9593"   # MPTYMD (current código)
    # issuer_name_patterns: ["Política Territorial"]   # historical (post-enumeration)
  - section: "5B"
    departamento_codigos:
      - "9593"
    # issuer_name_patterns: ["Política Territorial"]
  - section: "5C"
    departamento_codigos:
      - "9593"
    # issuer_name_patterns: ["Política Territorial"]
